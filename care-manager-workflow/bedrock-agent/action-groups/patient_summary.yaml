openapi: 3.0.0
info:
  title: Patient Summary Action Group
  version: 1.0.0
  description: Generate a narrative summary of a patient's clinical status.
paths:
  /patient-summary:
    post:
      summary: Get clinical summary for one patient
      description: >-
        Returns a structured narrative covering active conditions, current
        medications, recent lab results, and identified care gaps.
      operationId: getPatientSummary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [patient_name]
              properties:
                patient_name:
                  type: string
                  description: Patient full name or partial name for fuzzy matching
                focus_area:
                  type: string
                  description: Optional clinical focus (e.g., "diabetes", "cardiovascular")
                  default: ""
      responses:
        '200':
          description: Patient summary retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  patient_id:
                    type: string
                  summary_text:
                    type: string
                  conditions:
                    type: array
                    items: {type: string}
                  medications:
                    type: array
                    items: {type: string}
                  recent_labs:
                    type: array
                    items: {type: object}
                  care_gaps:
                    type: array
                    items: {type: string}
                  disclaimer:
                    type: string
                    description: AI-content disclaimer for the care manager
