# GitLab CI for the Amazon Connect Health Unified Clinical Workflow sample.
#
# This pipeline runs on every push and merge request. It enforces:
#   - Pre-commit security checks (secrets, PHI, account IDs)
#   - CloudFormation template linting (cfn-lint)
#   - Python syntax + style (compileall + ruff)
#   - JavaScript syntax (node --check) + ESLint (optional)
#
# The pipeline is intentionally lightweight — heavier integration tests
# require AWS credentials and run only on tagged releases.

stages:
  - lint
  - security
  - test

default:
  image: python:3.11-slim
  before_script:
    - apt-get update -qq && apt-get install -y --no-install-recommends bash grep findutils > /dev/null

# ──────────────────────────────────────────────────────────────
# SECURITY CHECKS
# ──────────────────────────────────────────────────────────────
security:secrets-and-phi:
  stage: security
  script:
    - echo "Running pre-commit security checks against the full repository..."
    - bash scripts/pre-commit-security-check.sh
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

security:gitleaks:
  stage: security
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]   # Override 'gitleaks' entrypoint so the script's 'sh -c' wrapper works
  before_script: []
  script:
    - gitleaks detect --source=. --no-banner --redact -v --exit-code 1
  allow_failure: true   # Informational — we already enforce secrets via pre-commit-security-check.sh
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ──────────────────────────────────────────────────────────────
# LINT
# ──────────────────────────────────────────────────────────────
lint:python:
  stage: lint
  script:
    - pip install --quiet ruff
    - echo "Compile-check all Python files..."
    - find provider-workflow care-manager-workflow scripts -name '*.py' -print0 | xargs -0 python -m py_compile
    - echo "Style check with ruff (informational only)..."
    - ruff check provider-workflow care-manager-workflow || true
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

lint:cloudformation:
  stage: lint
  script:
    - pip install --quiet cfn-lint
    - echo "Linting CloudFormation templates..."
    - 'find . \( -path "./provider-workflow/infrastructure/*.yaml" -o -path "./provider-workflow/infrastructure/*.yml" -o -path "./shared/cloudformation/*.yaml" -o -path "./shared/bedrock-guardrails/*.yaml" -o -path "./care-manager-workflow/infrastructure/*.yaml" \) -print0 | xargs -0 -r cfn-lint' 
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

lint:javascript-syntax:
  stage: lint
  image: node:20-alpine
  before_script:
    - apk add --no-cache findutils > /dev/null
  script:
    - echo "Node syntax check on all .js files..."
    - 'find . -path ./node_modules -prune -o -name "*.js" -type f -print0 | xargs -0 -r -I {} node --check {}'
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ──────────────────────────────────────────────────────────────
# TEST (Python only — Java tests require Maven, run separately)
# ──────────────────────────────────────────────────────────────
test:python-unit:
  stage: test
  script:
    - cd provider-workflow/backend
    - pip install --quiet -r requirements.txt
    - pip install --quiet pytest
    - python -m pytest tests/ -v || true   # No-fail until tests are filled in
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
