AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFront distribution for WebSocket (wss://) proxy to ALB'

Parameters:
  ALBDomainName:
    Type: String
    Description: Streaming ALB domain name (e.g., my-alb-123456.us-east-1.elb.amazonaws.com)

Resources:
  # CloudFront Distribution for WebSocket
  WebSocketDistribution:  # checkov:skip=CKV_AWS_86: Access logging not required for a demo/POC  # checkov:skip=CKV_AWS_68: WAF not required for a demo/POC
    Type: AWS::CloudFront::Distribution
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W70
            reason: "TLSv1.2_2021 is set in ViewerCertificate"
          - id: W10
            reason: "CloudFront access logging not required for a demo/POC"
          - id: W68
            reason: "WAF not required for a demo/POC — add AWS managed WAF rules for production"
    Properties:
      DistributionConfig:
        Enabled: true  # checkov:skip=CKV_AWS_68: WAF not required for a demo/POC
        Comment: 'WebSocket Proxy (wss://)'
        Origins:
          - Id: ALBOrigin
            DomainName: !Ref ALBDomainName
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginProtocolPolicy: http-only
              OriginReadTimeout: 60
              OriginKeepaliveTimeout: 60
        DefaultCacheBehavior:
          TargetOriginId: ALBOrigin
          ViewerProtocolPolicy: https-only
          AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          CachedMethods: [GET, HEAD]
          # Disable caching for WebSocket
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
          OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3  # AllViewer
          Compress: false
        PriceClass: PriceClass_100
        HttpVersion: http2
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
          MinimumProtocolVersion: TLSv1.2_2021

Outputs:
  WebSocketURL:
    Description: 'Secure WebSocket URL (wss://)'
    Value: !Sub 'wss://${WebSocketDistribution.DomainName}/stream'
  
  DistributionId:
    Description: 'CloudFront Distribution ID'
    Value: !Ref WebSocketDistribution
