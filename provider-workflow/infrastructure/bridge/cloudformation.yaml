AWSTemplateFormatVersion: '2010-09-09'
Description: 'ConnectHealth Streaming WebSocket Service - ECS Fargate with ALB'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
  
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to deploy into
  
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnets for ECS tasks and ALB (at least 2 in different AZs)
  
  CertificateArn:
    Type: String
    Description: ACM Certificate ARN for HTTPS (optional - leave empty for HTTP only)
    Default: ''
  
  StreamingEndpoint:
    Type: String
    Default: https://streaming.health-agent.us-east-1.api.aws
    Description: ConnectHealth streaming API endpoint (SDK auto-resolves, but can override)
  
  DomainId:
    Type: String
    Description: ConnectHealth domain ID (e.g., dom-abc123)
    Default: ''

  SubscriptionId:
    Type: String
    Description: ConnectHealth subscription ID (e.g., sub-xyz789)
    Default: ''

  OutputBucket:
    Type: String
    Default: ''
    Description: S3 bucket URI for clinical notes output (with s3:// prefix)
  
  ECRRepositoryURI:
    Type: String
    Description: ECR Repository URI with tag (e.g., 123456.dkr.ecr.us-east-1.amazonaws.com/repo:5)

Mappings:
  CloudFrontPrefixListMap:
    us-east-1:
      PrefixListId: pl-3b927c52
    us-east-2:
      PrefixListId: pl-b6a144df
    us-west-1:
      PrefixListId: pl-4ea04527
    us-west-2:
      PrefixListId: pl-82a045eb

Conditions:
  HasCertificate: !Not [!Equals [!Ref CertificateArn, '']]

Resources:

  # ECS Cluster
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub 'connect-health-streaming-${Environment}'
      ClusterSettings:
        - Name: containerInsights
          Value: enabled

  # CloudWatch Log Group
  LogGroup:
    Type: AWS::Logs::LogGroup  # checkov:skip=CKV_AWS_158: KMS encryption not required for a demo/POC
    DeletionPolicy: Delete  # Logs are short-lived; retention policy on the resource handles lifecycle
    UpdateReplacePolicy: Delete
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W84
            reason: "KMS encryption for CloudWatch logs not required for a demo/POC"
    Properties:
      LogGroupName: !Sub '/ecs/connect-health-streaming-${Environment}'
      RetentionInDays: 30

  # Task Execution Role (for ECS to pull images, write logs)
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W28
            reason: "Explicit name used for predictable cross-stack references and deployment commands"
    Properties:
      RoleName: !Sub 'connect-health-streaming-execution-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  # Task Role (for the application to access AWS services)
  TaskRole:
    Type: AWS::IAM::Role  # checkov:skip=CKV_AWS_111: health-agent scoped to domain ARN
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W28
            reason: "Explicit name used for predictable cross-stack references and deployment commands"
          - id: W11
            reason: "health-agent:StartMedicalScribeListeningSession scoped to domain-level ARN"
    Properties:
      RoleName: !Sub 'connect-health-streaming-task-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ConnectHealthAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # ConnectHealth (HealthAgent) streaming API access — scoped to specific action
              - Effect: Allow
                Action:
                  - health-agent:StartMedicalScribeListeningSession
                Resource: !Sub 'arn:aws:health-agent:${AWS::Region}:${AWS::AccountId}:domain/${DomainId}'
              # S3 access for clinical notes output
              # Note: OutputBucket param has s3:// prefix — extract bucket name for ARN
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub
                    - 'arn:aws:s3:::${BucketName}'
                    - BucketName: !Select [1, !Split ["//", !Ref OutputBucket]]
                  - !Sub
                    - 'arn:aws:s3:::${BucketName}/*'
                    - BucketName: !Select [1, !Split ["//", !Ref OutputBucket]]

  # Security Group for ALB
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W28
            reason: "Explicit name used for predictable cross-stack references and deployment commands"
          - id: W5
            reason: "ALB egress to 0.0.0.0/0 required to reach ECS tasks and perform health checks"
          - id: W40
            reason: "ALB egress uses -1 protocol to allow health check responses to ECS tasks"
    Properties:
      GroupName: !Sub 'connect-health-streaming-alb-${Environment}'
      GroupDescription: Security group for ConnectHealth Streaming ALB
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        # Restrict to CloudFront only — no direct internet access to ALB
        # NOTE: Only port 80 needed — CloudFront terminates TLS and forwards HTTP to ALB.
        # Adding a second prefix list rule (port 443) would exceed the default SG rules quota (60)
        # since the CloudFront prefix list contains ~45 IP ranges, each counting as a rule.
        # If you need HTTPS on the ALB, request a quota increase for "Inbound or outbound rules
        # per security group" (L-0EA8095F) to at least 120 before adding the port 443 rule.
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourcePrefixListId: !FindInMap [CloudFrontPrefixListMap, !Ref "AWS::Region", PrefixListId]
          Description: Allow HTTP from CloudFront managed prefix list only
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic (ALB to ECS and health checks)

  # Security Group for ECS Tasks
  ECSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W28
            reason: "Explicit name used for predictable cross-stack references and deployment commands"
          - id: W5
            reason: "ECS tasks require outbound internet access to reach AWS APIs (ConnectHealth, S3)"
          - id: W40
            reason: "ECS egress uses -1 protocol to allow all outbound traffic to AWS service endpoints"
    Properties:
      GroupName: !Sub 'connect-health-streaming-ecs-${Environment}'
      GroupDescription: Security group for ConnectHealth Streaming ECS tasks
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8081
          ToPort: 8081
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: Allow inbound from ALB only
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic (ConnectHealth API, S3, AWS APIs)

  # Application Load Balancer
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer  # checkov:skip=CKV_AWS_91: ALB access logging not required for a demo/POC
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W28
            reason: "Explicit name used for predictable cross-stack references and deployment commands"
          - id: W52
            reason: "ALB access logging not required for a demo/POC"
    Properties:
      Name: !Sub 'connect-health-streaming-${Environment}'
      Type: application
      Scheme: internet-facing
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Subnets: !Ref SubnetIds
      LoadBalancerAttributes:
        - Key: routing.http.drop_invalid_header_fields.enabled
          Value: 'true'

  # Target Group with WebSocket stickiness
  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub 'connect-health-ws-${Environment}'
      Port: 8081
      Protocol: HTTP  # checkov:skip=CKV_AWS_103: Target group HTTP intentional — CloudFront terminates TLS, ALB forwards HTTP internally
      VpcId: !Ref VpcId
      TargetType: ip
      HealthCheckPath: /
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      # Enable stickiness for WebSocket connections
      TargetGroupAttributes:
        - Key: stickiness.enabled
          Value: 'true'
        - Key: stickiness.type
          Value: lb_cookie
        - Key: stickiness.lb_cookie.duration_seconds
          Value: '86400'

  # HTTP Listener
  HTTPListener:  # checkov:skip=CKV_AWS_2: HTTP intentional — CloudFront terminates TLS  # checkov:skip=CKV_AWS_103: HTTP intentional — CloudFront terminates TLS
    Type: AWS::ElasticLoadBalancingV2::Listener
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W56
            reason: "HTTP listener intentional — CloudFront terminates TLS and forwards HTTP to ALB"
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP  # checkov:skip=CKV_AWS_2: HTTP intentional — CloudFront terminates TLS  # checkov:skip=CKV_AWS_103: HTTP intentional — CloudFront terminates TLS
      DefaultActions:
        - !If
          - HasCertificate
          - Type: redirect
            RedirectConfig:
              Protocol: HTTPS
              Port: '443'
              StatusCode: HTTP_301
          - Type: forward
            TargetGroupArn: !Ref TargetGroup

  # HTTPS Listener (conditional)
  HTTPSListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: HasCertificate
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 443
      Protocol: HTTPS
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # ECS Task Definition
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub 'connect-health-streaming-${Environment}'
      Cpu: '512'
      Memory: '1024'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: connect-health-streaming
          Image: !Ref ECRRepositoryURI
          Essential: true
          PortMappings:
            - ContainerPort: 8081
              Protocol: tcp
          Environment:
            - Name: PORT
              Value: '8081'
            - Name: STREAMING_ENDPOINT
              Value: !Ref StreamingEndpoint
            - Name: CONNECT_HEALTH_REGION
              Value: 'us-east-1'
            - Name: OUTPUT_BUCKET
              Value: !Ref OutputBucket
            - Name: DOMAIN_ID
              Value: !Ref DomainId
            - Name: SUBSCRIPTION_ID
              Value: !Ref SubscriptionId
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: streaming

  # ECS Service
  ECSService:
    Type: AWS::ECS::Service
    DependsOn: HTTPListener
    Properties:
      ServiceName: !Sub 'connect-health-streaming-${Environment}'
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: 2
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups:
            - !Ref ECSSecurityGroup
          Subnets: !Ref SubnetIds
      LoadBalancers:
        - ContainerName: connect-health-streaming
          ContainerPort: 8081
          TargetGroupArn: !Ref TargetGroup
      DeploymentConfiguration:
        MinimumHealthyPercent: 50
        MaximumPercent: 200

Outputs:
  ALBDNSName:
    Description: ALB DNS Name (use for WebSocket connections)
    Value: !GetAtt ALB.DNSName
    Export:
      Name: !Sub '${AWS::StackName}-ALBDNSName'
  
  WebSocketURL:
    # nosemgrep: detect-insecure-websocket — ALB output is intentionally non-TLS; browsers use CloudFront (wss://)
    Description: >-
      WebSocket URL for direct ALB access (non-TLS).
      For browser use, connect via the CloudFront distribution which terminates TLS.
    Value: !Sub 'ws://${ALB.DNSName}/stream'  # nosemgrep: detect-insecure-websocket — ALB is intentionally non-TLS; browsers connect via CloudFront (wss://) which terminates TLS
    Export:
      Name: !Sub '${AWS::StackName}-WebSocketURL'
  
  ECSClusterName:
    Description: ECS Cluster Name
    Value: !Ref ECSCluster
    Export:
      Name: !Sub '${AWS::StackName}-ECSClusterName'
  
  ECSServiceName:
    Description: ECS Service Name
    Value: !GetAtt ECSService.Name
    Export:
      Name: !Sub '${AWS::StackName}-ECSServiceName'
